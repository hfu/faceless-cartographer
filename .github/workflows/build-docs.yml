name: build-docs

on:
  push:
    branches: [main]
  schedule:
    # Daily, independent of pushes to this repo -- catches upstream changes
    # to hfu/layers-martin's STAFF_PROMPT.md (fetched at build time, see
    # scripts/fetch-staff-prompt.mjs and DECISIONS.md D19) even when nothing
    # here changed.
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Commit docs/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs src/staff-prompt.txt
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Rebuild static site"
            git push
          fi
