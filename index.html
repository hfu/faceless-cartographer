<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>faceless-cartographer</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<link rel="stylesheet" href="https://unpkg.com/@digital-go-jp/design-tokens@2.0.1/dist/tokens.css">
<link rel="stylesheet" href="/src/dads-components.css">
<style>
  * { box-sizing: border-box; }
  html { font-family: var(--font-family-sans); }
  body { margin: 0; height: 100%; }
  #app { height: 100%; }
  code { background: rgba(0,0,0,0.06); padding: .1rem .3rem; border-radius: var(--border-radius-4); }
  .notice { border-radius: var(--border-radius-8); padding: .5rem .6rem; margin: .4rem 0; font-size: 0.82rem; }
  .notice { color: var(--color-semantic-warning-yellow-1); background: rgba(183, 143, 0, 0.08); }
  .notice.error { color: var(--color-semantic-error-1); background: rgba(236, 0, 0, 0.08); }
  .notice.info { color: var(--color-neutral-solid-gray-536); background: rgba(0, 0, 0, 0.05); }

  /* Form view */
  .form-view { background: var(--color-neutral-solid-gray-50); min-height: 100%; padding: 1.25rem; }
  .form-view .wrap { max-width: 42rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
  .card { background: rgba(255, 255, 255, 0.92); border-radius: var(--border-radius-12); box-shadow: var(--elevation-1); padding: 1.25rem 1.5rem; }
  .card h1 { font-size: 1.15rem; margin: 0 0 .3rem; }
  textarea { width: 100%; box-sizing: border-box; font-family: var(--font-family-mono); font-size: 0.82rem; border-radius: var(--border-radius-8); border: 1px solid var(--color-neutral-solid-gray-300); padding: .6rem; }
  pre { white-space: pre-wrap; font-family: var(--font-family-mono); font-size: 0.78rem; max-height: 24rem; overflow-y: auto; background: rgba(0,0,0,0.04); border-radius: var(--border-radius-8); padding: .75rem; margin: 0; }

  /* Map view */
  .map-view { position: fixed; inset: 0; }
  #map { position: absolute; inset: 0; }
  /* Flush against the top-left corner (no outer margin) so the panel can
     use the full viewport height; only the bottom-right corner is rounded.
     Flex column + max-height:100vh keeps the actions row reachable: the
     content area scrolls, everything else (toggle, padding) stays inside
     the viewport instead of overflowing past its bottom edge. */
  .panel {
    position: absolute; top: 0; left: 0; max-width: 22rem; max-height: 100vh;
    display: flex; flex-direction: column;
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 0 0 var(--border-radius-12) 0; box-shadow: var(--elevation-1);
    z-index: 10; line-height: 1.45; font-size: 0.88rem;
    transition: width 0.2s ease, height 0.2s ease;
  }
  .panel[data-collapsed="false"] { padding: .9rem 1rem; }
  .panel[data-collapsed="true"] { width: 2.75rem; height: 2.75rem; padding: .4rem; overflow: hidden; }
  .panel__toggle { flex: none; align-self: flex-start; background: transparent; border: none; cursor: pointer; padding: 0.2rem; color: currentColor; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; line-height: 1; }
  .panel[data-collapsed="true"] .panel__toggle svg { transform: scaleX(-1); }
  .panel__content { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .panel[data-collapsed="true"] .panel__content { display: none; }
  .panel h1 { font-size: 1rem; margin: 0 0 .4rem; }
  .panel .layers { margin: .5rem 0; }
  .panel .layers strong { display: block; margin-bottom: .2rem; }
  .panel .layer-label { display: block; margin-bottom: .3rem; color: #555; }
  .panel .legend-section { margin: .5rem 0; }
  .panel .legend-section[data-has-entries="false"] { display: none; }
  .panel .legend-section strong { display: block; margin-bottom: .2rem; }
  .panel .legend-entry { margin-top: .4rem; }
  .panel .legend-entry .label { display: block; font-size: 0.76rem; color: #555; margin-bottom: .2rem; }
  .panel .legend-entry img { max-width: 100%; display: block; }
  .panel .actions { display: flex; gap: .5rem; align-items: center; margin-top: .6rem; flex-wrap: wrap; }
  @media (max-width: 30rem) { .panel { max-width: none; } }
  .maplibregl-ctrl-top-right { max-width: calc(100vw - 2rem); }
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
